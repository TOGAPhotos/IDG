name: Deploy Dev

on:
  pull_request:
    types: [closed]
    branches:
      - dev

permissions:
  contents: read

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: Dev
    steps:
      - name: SSH remote deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -euo pipefail

            APP_DIR="${{ vars.DEV_APP_DIR || '$HOME/IDG-dev' }}"
            APP_DIR="${APP_DIR/#\~/$HOME}"
            REPO_SSH_URL="git@github.com:${{ github.repository }}.git"
            TARGET_REF="${{ github.event.pull_request.merge_commit_sha }}"
            LOCK_FILE="/tmp/idg-dev-deploy.lock"

            if [ -z "$APP_DIR" ] || [ "$APP_DIR" = "/" ] || [ "$APP_DIR" = "$HOME" ]; then
              echo "Unsafe APP_DIR: $APP_DIR"
              exit 1
            fi

            if [ -z "$TARGET_REF" ]; then
              echo "TARGET_REF is empty"
              exit 1
            fi

            (
              flock -w 600 9

              if [ ! -d "$APP_DIR/.git" ]; then
                rm -rf "$APP_DIR"
                git clone "$REPO_SSH_URL" "$APP_DIR"
              fi

              cd "$APP_DIR"
              git fetch --prune origin
              git checkout -B dev "$TARGET_REF"
              git reset --hard "$TARGET_REF"

              npm ci
              npx prisma generate
              rm -rf dist
              npm run build
              npx pm2 startOrRestart togaserver.config.cjs --update-env
              npx pm2 save
            ) 9>"$LOCK_FILE"

      - name: Notification
        if: always()
        continue-on-error: true
        uses: easychen/github-action-server-chan@v1.0.0
        with:
          sendkey: ${{ secrets.SENDKEY }}
          title: "TOGA Backend Dev Deploy Notification"
          desp: "DeployResult:${{ job.status }}"
