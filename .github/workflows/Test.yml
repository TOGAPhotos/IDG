name: Test

on:
  pull_request:
    branches:
      - main
      - dev
      - release
  push:
    branches:
      - fix/**
      - feat/**
  merge_group:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    environment: Test
    steps:
      - name: setup Redis
        uses: supercharge/redis-github-action@1.8.1
        with:
          redis-version: "7.2.4"
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: npm run build --if-present
      - run: npm test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CORS_WHITE_LIST: ${{ secrets.CORS_WHITE_LIST }}
          PASSWORD_CRYPT_KEY: "114514"
          JWT_SECRET: "114514"
      - name: Notification
        if: always()
        continue-on-error: true
        uses: easychen/github-action-server-chan@v1.0.0
        with:
          sendkey: ${{ secrets.SENDKEY }}
          title: "TOGA Backend CI/CD work Notification"
          desp: "Test Result:${{ job.status }}"
